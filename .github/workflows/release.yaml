# Requires GitHub secrets
# - GH_TOKEN
# - PYPI_TOKEN

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to auto-detect from commits)"
        required: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group ci

      - name: Semantic release (auto)
        if: ${{ !inputs.version }}
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GH_TOKEN }}

      - name: Semantic release (version override)
        if: ${{ inputs.version }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: uv run semantic-release version --define "version=${{ inputs.version }}"

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}
